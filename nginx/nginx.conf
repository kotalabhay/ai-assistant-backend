events {
    worker_connections 1024;
}

http {
    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Explicit Upstream Definitions
    upstream backend_api {
        server backend:8000;
    }

    upstream frontend_ui {
        server ui:80;
    }

    server {
        listen 80;
        server_name localhost;

        # Reverse Proxy for Backend API v1
        location /api/v1/ {
            proxy_pass http://backend_api/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout configuration for LLM queries
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Reverse Proxy for Frontend UI SPA
        location / {
            proxy_pass http://frontend_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
