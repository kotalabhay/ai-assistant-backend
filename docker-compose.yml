services:
  ui:
    build:
      context: ../ai-assistant-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/api/v1/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    depends_on:
      ui:
        condition: service_healthy
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge
